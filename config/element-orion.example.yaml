app:
  name: Element Orion
  workspace_root: .
  session_dir: ./.element-orion
  memory_dir: ./.element-orion/memory
  load_all_memory_shards: false
  max_agent_loops: 32
  max_tool_calls_per_turn: 96
  history_compaction:
    enabled: true
    trigger_tokens: 12000
    target_tokens: 7000
    preserve_recent_messages: 16

llm:
  api_type: codex
  base_url: https://api.openai.com/v1
  api_key: ""
  api_key_env: OPENAI_API_KEY
  model: gpt-5.4
  vision_enabled: false
  reasoning_effort: medium
  max_thinking_token: off
  temperature: 0.4
  max_tokens: 3200
  context_window_tokens: 28000
  inject_message_timestamps: true
  timeout: 180s
  request_max_attempts: 3
  retry_initial_backoff: 2s
  retry_max_backoff: 8s
  headers: {}
  kimi-no-think: false
  glm-no-think: false

tools:
  enabled:
    - send_discord_message
    - add_discord_reaction
    - discord_api_request
    - read_file
    - write_file
    - replace_in_file
    - list_dir
    - grep_search
    - mkdir
    - move_path
    - delete_path
    - exec_command
    - compact_context
    - send_discord_file
    - start_background_task
    - list_background_tasks
    - get_background_task
    - get_background_task_logs
    - cancel_background_task
    - schedule_heartbeat_wakeup
    - list_scheduled_wakeups
    - cancel_scheduled_wakeup
    - add_rss_feed
    - list_rss_feeds
    - read_rss_feed
    - remove_rss_feed
    - reminders
    - list_sandbox_containers
    - inspect_sandbox_container
    - create_sandbox_container
    - start_sandbox_container
    - stop_sandbox_container
    - delete_sandbox_container
    - search_gifs
    - get_weather
    - search_web
    - search_news
  exec_shell: /bin/zsh
  exec_timeout: 120s
  max_file_bytes: 1048576
  max_search_results: 50
  max_command_output_bytes: 65536
  allowed_commands: []

background_tasks:
  default_min_runtime: 90s
  inject_current_time: true
  max_event_log_entries: 300
  sandbox:
    enabled: false
    force: false
    use_sudo: false
    provider: nspawn
    release: stable
    architecture: amd64
    mirror: http://deb.debian.org/debian/
    machines_dir: ./.element-orion/sandboxes
    setup_timeout: 20m
    auto_cleanup: true

dashboard:
  enabled: false
  listen_addr: 127.0.0.1:8788
  path: /dashboard

skills:
  enabled: true
  load:
    user_dir: "~/.openclaw/skills"
    bundled_dir: ../skills/bundled
    extra_dirs: []

discord:
  token_mode: bot
  bot_token: ""
  user_token: ""
  allow_direct_messages: true
  allow_group_direct_messages: false
  allowed_guild_ids: []
  allowed_dm_user_ids: []
  allowed_outbound_channel_ids: []
  guild_session_scope: channel
  reply_to_message: false
  download_incoming_attachments: true
  incoming_attachments_dir: ./.element-orion/incoming-attachments

gifs:
  enabled: false
  provider: giphy
  api_key: ""
  api_key_env: GIPHY_API_KEY
  search_limit: 6
  content_filter: pg-13

heartbeat:
  every: 30m
  model: ""
  light_context: false
  isolated_session: true
  ack_max_chars: 300
  show_ok: false
  show_alerts: true
  use_indicator: true
  event_poll_interval: 5s
  active_hours:
    timezone: ""
    start: ""
    end: ""
  target:
    guild_id: ""
    channel_id: ""
    user_id: ""

event_webhook:
  enabled: false
  listen_addr: 127.0.0.1:8787
  path: /event
  secret: ""
  secret_env: ELEMENT_ORION_EVENT_WEBHOOK_SECRET
  default_mode: now

mcp:
  servers: []
