<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lumen Dashboard</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <script>window.LUMEN_DASHBOARD_BASE_PATH = "__BASE_PATH__";</script>
  <div class="app-shell">
    <header class="topbar">
      <h1>Lumen</h1>
      <div class="topbar-meta">
        <div class="poll-status" id="poll-status">Live</div>
        <div id="last-updated">Waiting</div>
      </div>
    </header>

    <main class="workspace">
      <section class="graph-panel">
        <div class="panel-header">
          <h2>Graph</h2>
          <div class="graph-stats" id="graph-stats"></div>
        </div>
        <div class="graph-frame" id="graph-frame">
          <div class="graph-hud">
            <div class="graph-controls">
              <button type="button" id="zoom-out">-</button>
              <button type="button" id="zoom-in">+</button>
              <button type="button" id="zoom-fit">Fit</button>
              <button type="button" id="zoom-reset">100%</button>
              <button type="button" id="toggle-active-only">All</button>
            </div>
            <div class="graph-hint" id="graph-hint">Drag background to pan</div>
          </div>
          <div class="graph-stage" id="graph-stage">
            <svg class="graph-lines" id="graph-lines" aria-hidden="true"></svg>

            <button id="node-discord" class="graph-node" type="button" data-node="discord">
              <span class="node-icon"><i class="fa-brands fa-discord" aria-hidden="true"></i></span>
              <span class="node-label">Discord</span>
            </button>

            <button id="node-agent" class="graph-node" type="button" data-node="agent">
              <span class="node-icon"><i class="fa-solid fa-robot" aria-hidden="true"></i></span>
              <span class="node-label">Agent</span>
            </button>

            <button id="node-llms" class="graph-node" type="button" data-node="llms">
              <span class="node-icon"><i class="fa-solid fa-brain" aria-hidden="true"></i></span>
              <span class="node-label">LLMs</span>
            </button>

            <button id="node-tool" class="graph-node" type="button" data-node="tool">
              <span class="node-icon"><i class="fa-solid fa-screwdriver-wrench" aria-hidden="true"></i></span>
              <span class="node-label">Tools</span>
            </button>

            <div id="tool-branch"></div>
          </div>
          <div class="minimap" id="minimap">
            <svg id="minimap-svg" viewBox="0 0 320 180" aria-hidden="true"></svg>
          </div>
        </div>
      </section>

      <aside class="detail-panel">
        <div class="panel-header">
          <h2 id="detail-title">Details</h2>
        </div>
        <div class="detail-body" id="detail-body"></div>
      </aside>
    </main>

    <section class="logs-panel">
      <div class="panel-header">
        <h2>Logs</h2>
      </div>
      <div id="logs" class="logs-list"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
